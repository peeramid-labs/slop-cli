name: Prepare Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-prepare
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare Release PR
    runs-on: ubuntu-latest
    # Manual trigger only (workflow_dispatch) — no skip conditions needed
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tools
        uses: cargo-bins/cargo-binstall@v1.17.9
      - name: Install cargo-edit and git-cliff
        run: cargo binstall --no-confirm cargo-edit git-cliff

      - name: Calculate version bump
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read current version from workspace root Cargo.toml.
          # crates/sloppoke-cli inherits via `version.workspace = true`,
          # so the canonical value lives in [workspace.package].
          CRATE_DIR="crates/sloppoke-cli"
          CURRENT=$(awk '/^\[workspace.package\]/{f=1} f && /^version *=/{print; exit}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$CURRENT" ]; then
            echo "::error::could not parse workspace version from Cargo.toml" >&2
            exit 1
          fi
          echo "Current version: $CURRENT"

          # Find previous tag to determine commit range
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            PREV_REF=$(git rev-list --max-parents=0 HEAD)
          else
            PREV_REF="$PREV_TAG"
          fi

          # Read commits since last tag/release (exclude release machinery)
          COMMITS=$(git log "${PREV_REF}..HEAD" --format="%s" 2>/dev/null \
            | grep -v "^chore(release):" \
            | grep -v "^Merge pull request.*release/" \
            || true)
          if [ -z "$(echo "$COMMITS" | tr -d '[:space:]')" ]; then
            echo "No new commits found since $PREV_REF (only release machinery)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "--- Commits since last release ---"
          echo "$COMMITS" | head -30
          echo "---"

          # Classify bump type from conventional commits
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^feat(\(|!|:)"; then
            BUMP="minor"
          fi
          if echo "$COMMITS" | grep -qiE "(^[a-z]+(\(.*\))?!:)|BREAKING CHANGE"; then
            BUMP="major"
          fi

          # Bump from current Cargo.toml version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP ($CURRENT -> $NEW_VERSION)"

          # Check if release branch already exists
          BRANCH="release/slop/v${NEW_VERSION}"
          EXISTING=$(git ls-remote --heads origin "$BRANCH" 2>/dev/null | wc -l)
          if [ "$EXISTING" -gt 0 ]; then
            echo "Release branch $BRANCH already exists — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release PR already exists
        if: steps.bump.outputs.skip != 'true'
        id: existing
        env:
          FORGEJO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORGEJO_API: ${{ github.api_url }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          BRANCH="release/slop/v${VERSION}"
          # Forgejo's pulls API: filter by head branch. Returns [] if
          # none, [{...}] if open.
          EXISTING=$(curl -fsSL \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            "${FORGEJO_API}/repos/${REPO}/pulls?state=open&head=${BRANCH}" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d[0]["number"] if d else "")' \
            2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Release PR #${EXISTING} already exists for ${BRANCH}"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release branch and PR
        if: steps.bump.outputs.skip != 'true' && steps.existing.outputs.exists != 'true'
        env:
          FORGEJO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORGEJO_API: ${{ github.api_url }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          BRANCH="release/slop/v${VERSION}"

          # Create release branch from dev
          git checkout -b "$BRANCH"

          # Bump version
          # --workspace bumps [workspace.package].version which the
          # sole crate (sloppoke-cli) inherits via .workspace = true.
          cargo set-version --workspace "$VERSION"
          cargo generate-lockfile

          # Prepend new changelog section (preserves existing hand-curated content).
          # Skip silently if CHANGELOG.md doesn't exist yet — slop-cli is
          # still pre-release and we don't gate the workflow on it.
          if [ -f CHANGELOG.md ]; then
            NEW_SECTION=$(git-cliff --tag "v${VERSION}" --unreleased --strip header 2>/dev/null || true)
            if [ -n "$NEW_SECTION" ]; then
              HEADER_END=$(grep -n "^## " CHANGELOG.md | head -1 | cut -d: -f1)
              if [ -n "$HEADER_END" ]; then
                {
                  head -n $((HEADER_END - 1)) CHANGELOG.md
                  echo ""
                  echo "$NEW_SECTION"
                  echo ""
                  tail -n +"$HEADER_END" CHANGELOG.md
                } > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
              fi
            fi
          fi

          # Commit changes (if any — version may already match Cargo.toml)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage workspace root + crate manifests + lockfile.
          # `git add -u` only updates already-tracked files, which is
          # what we want — CHANGELOG.md is optional here.
          git add -u Cargo.toml Cargo.lock crates/*/Cargo.toml 2>/dev/null || true
          [ -f CHANGELOG.md ] && git add -u CHANGELOG.md || true
          if git diff --cached --quiet; then
            echo "No version changes needed — creating empty release commit"
            git commit --allow-empty -m "chore(release): v${VERSION}"
          else
            git commit -m "chore(release): v${VERSION}"
          fi
          git push origin "$BRANCH"

          # Generate PR body from changelog
          CHANGELOG_BODY=$(git-cliff --tag "v${VERSION}" --unreleased --strip header 2>/dev/null || echo "Release v${VERSION}")

          # Write PR body to a temp file (avoids heredoc/YAML indentation conflicts)
          {
            echo "## Release v${VERSION}"
            echo ""
            echo "This PR was automatically generated by the release workflow."
            echo ""
            echo "**Review the changelog below** and edit \`CHANGELOG.md\` directly if needed before merging."
            echo ""
            echo "---"
            echo ""
            echo "${CHANGELOG_BODY}"
            echo ""
            echo "---"
            echo ""
            echo "> Merging this PR will trigger the publish workflow: tag creation, binary builds, and GitHub Release."
          } > /tmp/pr-body.md

          # ── Forgejo REST: ensure the "release" label, get its id ──
          LABEL_ID=$(curl -fsSL \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            "${FORGEJO_API}/repos/${REPO}/labels" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(next((l["id"] for l in d if l["name"]=="release"), ""))' \
            2>/dev/null || echo "")
          if [ -z "$LABEL_ID" ]; then
            LABEL_ID=$(curl -fsSL -X POST \
              -H "Authorization: token ${FORGEJO_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"name":"release","color":"#0e8a16","description":"Automated release PR"}' \
              "${FORGEJO_API}/repos/${REPO}/labels" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin).get("id",""))' \
              2>/dev/null || echo "")
          fi
          if [ -z "$LABEL_ID" ]; then
            echo "::warning::could not create or find 'release' label — opening PR without it"
          fi

          # ── Forgejo REST: open the PR ─────────────────────────────
          PR_BODY=$(python3 -c 'import json,sys; print(json.dumps(open(sys.argv[1]).read()))' /tmp/pr-body.md)
          PR_PAYLOAD=$(printf '{"title":"chore(release): v%s","head":"%s","base":"dev","body":%s}' \
            "${VERSION}" "${BRANCH}" "${PR_BODY}")
          PR_NUMBER=$(curl -fsSL -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PR_PAYLOAD}" \
            "${FORGEJO_API}/repos/${REPO}/pulls" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin).get("number",""))')
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::PR create failed"
            exit 1
          fi
          echo "Opened PR #${PR_NUMBER}"

          # ── Forgejo REST: attach the label ────────────────────────
          if [ -n "$LABEL_ID" ]; then
            curl -fsSL -X POST \
              -H "Authorization: token ${FORGEJO_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"labels\":[${LABEL_ID}]}" \
              "${FORGEJO_API}/repos/${REPO}/issues/${PR_NUMBER}/labels" >/dev/null \
              || echo "::warning::label attach failed (non-fatal)"
          fi
