name: Update Coverage

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: Run Coverage & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: "ci-tools-v3"

      - name: Install Tools (binstall)
        uses: cargo-bins/cargo-binstall@v1.17.9

      - name: Install cargo-llvm-cov
        run: |
          cargo binstall --no-confirm --force cargo-llvm-cov
          cargo llvm-cov --version

      - name: Run Tests & Coverage
        run: |
          IGNORE_RE="(src/main\.rs|src/bin/)"
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --bins --no-report
          mkdir -p coverage
          cargo llvm-cov report \
            --ignore-filename-regex "$IGNORE_RE" \
            --cobertura --output-path coverage/cobertura.xml
          cargo llvm-cov report \
            --ignore-filename-regex "$IGNORE_RE" \
            --html --output-dir coverage

      - name: Publish coverage to gh-pages
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          mkdir -p /tmp/ghpages
          if [ -f coverage/html/index.html ]; then
            cp -r coverage/html/* /tmp/ghpages/
          fi
          cd /tmp/ghpages
          git init -q
          git checkout --orphan gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "ci: coverage (${BRANCH}) [skip ci]"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin gh-pages --force
