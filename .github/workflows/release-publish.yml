name: Publish Release

on:
  pull_request:
    branches: [dev]
    types: [closed]

permissions:
  contents: write

concurrency:
  group: release-publish
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    outputs:
      tag: ${{ steps.extract.outputs.tag }}
      version: ${{ steps.extract.outputs.version }}
      changelog_body: ${{ steps.changelog.outputs.body }}
      has_tap_token: ${{ steps.secrets.outputs.has_tap_token }}
      has_apt_token: ${{ steps.secrets.outputs.has_apt_token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from branch name
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          # Branch is release/slop/v0.2.0 — strip prefix, take last v
          SUFFIX="${BRANCH#release/}"
          VERSION="${SUFFIX##*/v}"
          VERSION="${VERSION#v}"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release: $TAG (from branch $BRANCH)"

      - name: Check optional secrets
        id: secrets
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          APT_TOKEN: ${{ secrets.APT_GITHUB_TOKEN }}
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "has_tap_token=$( [ -n "$TAP_TOKEN" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "has_apt_token=$( [ -n "$APT_TOKEN" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "has_gpg_key=$( [ -n "$GPG_KEY" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Import GPG key
        if: steps.secrets.outputs.has_gpg_key == 'true'
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_tag_gpgsign: true

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git config --get user.signingkey > /dev/null 2>&1; then
            git tag -s "${{ steps.extract.outputs.tag }}" -m "Release ${{ steps.extract.outputs.tag }}"
          else
            git tag "${{ steps.extract.outputs.tag }}"
          fi
          git push origin "${{ steps.extract.outputs.tag }}"

      - name: Extract changelog body
        id: changelog
        env:
          PR_BODY_RAW: ${{ github.event.pull_request.body }}
        run: |
          VERSION="${{ steps.extract.outputs.version }}"
          BODY=""
          SECTION=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG.md 2>/dev/null || true)
          if [ -n "$SECTION" ]; then BODY="$SECTION"; fi
          if [ -z "$BODY" ]; then BODY="$PR_BODY_RAW"; fi
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then BODY="Release v${VERSION}"; fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Delete release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push origin --delete "${{ github.event.pull_request.head.ref }}" || true

      - name: Sync released version back to dev
        run: |
          TAG="${{ steps.extract.outputs.tag }}"
          git checkout dev
          git pull origin dev
          # Canonical version lives in [workspace.package] at the
          # workspace root Cargo.toml. crates/sloppoke-cli inherits
          # via `version.workspace = true`, so we only sync the root.
          ROOT_RELEASE_VER=$(git show "$TAG:Cargo.toml" 2>/dev/null \
            | awk '/^\[workspace.package\]/{f=1} f && /^version *=/{print; exit}' \
            | sed 's/.*"\(.*\)".*/\1/' || true)
          ROOT_DEV_VER=$(awk '/^\[workspace.package\]/{f=1} f && /^version *=/{print; exit}' Cargo.toml \
            | sed 's/.*"\(.*\)".*/\1/')
          if [ -n "$ROOT_RELEASE_VER" ] && [ "$ROOT_RELEASE_VER" != "$ROOT_DEV_VER" ]; then
            # In-place replace the version line inside [workspace.package]
            # only. Safer than a blanket s/^version/.../ which would also
            # rewrite [package] versions if any sub-crate pinned its own.
            awk -v new="$ROOT_RELEASE_VER" '
              /^\[workspace.package\]/{in_ws=1}
              /^\[/ && !/^\[workspace.package\]/{in_ws=0}
              in_ws && /^version *=/{ sub(/"[^"]+"/, "\"" new "\"") }
              {print}
            ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
            cargo generate-lockfile
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -u Cargo.toml Cargo.lock
            if ! git diff --cached --quiet; then
              git commit -m "chore(release): sync version from $TAG to dev"
              git push origin dev
            fi
          fi

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            deb_arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            deb_arch: arm64
          - target: x86_64-apple-darwin
            os: macos-13
            use_cross: false
            deb_arch: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            deb_arch: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # cargo-zigbuild replaces cross-rs for linux targets — works on
      # the aarch64 forgejo runner without Docker, and avoids the
      # cross-0.2.5 bug where it tries to `rustup toolchain add
      # stable-x86_64-unknown-linux-gnu` (a host toolchain that can't
      # run on aarch64). Mac targets build natively and skip zig.
      - name: Install zig
        if: matrix.use_cross
        uses: mlugg/setup-zig@v2
        with:
          version: "0.13.0"

      - name: Install cargo-zigbuild
        if: matrix.use_cross
        uses: cargo-bins/cargo-binstall@v1.17.9
      - name: Install cargo-zigbuild via binstall
        if: matrix.use_cross
        run: |
          cargo binstall --no-confirm --force cargo-zigbuild
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          cargo-zigbuild --version

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} -p sloppoke-cli
          else
            cargo build --release --target ${{ matrix.target }} -p sloppoke-cli
          fi

      - name: Package slop binary
        run: |
          TAG="${{ needs.tag.outputs.tag }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="slop-${TAG}-${TARGET}.tar.gz"
          tar czf "${ARCHIVE}" -C "target/${TARGET}/release" slop
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Compute SHA256
        id: sha
        run: |
          if command -v sha256sum &>/dev/null; then
            SHA=$(sha256sum "${{ env.ARCHIVE }}" | awk '{print $1}')
          else
            SHA=$(shasum -a 256 "${{ env.ARCHIVE }}" | awk '{print $1}')
          fi
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        if: matrix.deb_arch != ''
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          ARCH="${{ matrix.deb_arch }}"
          BINARY="target/${{ matrix.target }}/release/slop"
          bash packaging/deb/build-deb.sh "$VERSION" "$ARCH" "$BINARY"
          echo "DEB_FILE=slop_${VERSION}_${ARCH}.deb" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

      - uses: actions/upload-artifact@v4
        if: matrix.deb_arch != ''
        with:
          name: deb-${{ matrix.deb_arch }}
          path: ${{ env.DEB_FILE }}

      - name: Write SHA256 file
        run: echo "${{ steps.sha.outputs.sha256 }}" > "${{ matrix.target }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: sha256-file-${{ matrix.target }}
          path: ${{ matrix.target }}.sha256

  release:
    name: Create GitHub Release
    needs: [tag, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          path: debs
          pattern: deb-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: ${{ needs.tag.outputs.tag }}
          body: ${{ needs.tag.outputs.changelog_body }}
          files: |
            artifacts/*.tar.gz
            debs/*.deb
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: [tag, build-binaries, release]
    runs-on: ubuntu-latest
    if: needs.tag.outputs.has_tap_token == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: shasums
          pattern: sha256-file-*
          merge-multiple: true

      - name: Generate Homebrew formula
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          SHA_MAC_ARM=$(cat shasums/aarch64-apple-darwin.sha256)
          SHA_MAC_X86=$(cat shasums/x86_64-apple-darwin.sha256)
          SHA_LIN_ARM=$(cat shasums/aarch64-unknown-linux-gnu.sha256)
          SHA_LIN_X86=$(cat shasums/x86_64-unknown-linux-gnu.sha256)
          sed \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{SHA256_MACOS_ARM64}}/${SHA_MAC_ARM}/g" \
            -e "s/{{SHA256_MACOS_X86_64}}/${SHA_MAC_X86}/g" \
            -e "s/{{SHA256_LINUX_ARM64}}/${SHA_LIN_ARM}/g" \
            -e "s/{{SHA256_LINUX_X86_64}}/${SHA_LIN_X86}/g" \
            packaging/homebrew/slop.rb.template > slop.rb

      - name: Push to Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/peeramid-labs/homebrew-tap.git" tap-repo
          mkdir -p tap-repo/Formula
          cp slop.rb tap-repo/Formula/slop.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/slop.rb
          git commit -m "slop ${VERSION}" || echo "No changes to commit"
          git push origin main

  update-apt:
    name: Update APT Repository
    needs: [tag, build-binaries, release]
    runs-on: ubuntu-latest
    if: needs.tag.outputs.has_apt_token == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: debs
          pattern: deb-*
          merge-multiple: true

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Update APT repository
        env:
          APT_TOKEN: ${{ secrets.APT_GITHUB_TOKEN }}
          GPG_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          git clone "https://x-access-token:${APT_TOKEN}@github.com/peeramid-labs/apt-repo.git" apt-repo
          mkdir -p apt-repo/pool/main
          cp debs/*.deb apt-repo/pool/main/
          cd apt-repo
          GPG_ID=""
          if [ -n "${GPG_KEY:-}" ]; then
            if echo "$GPG_KEY" | grep -q "BEGIN PGP"; then
              echo "$GPG_KEY" | gpg --batch --import || echo "::warning::GPG import failed"
            else
              echo "$GPG_KEY" | base64 -d | gpg --batch --import || echo "::warning::GPG import (base64) failed"
            fi
            GPG_ID=$(gpg --list-keys --with-colons 2>/dev/null | grep '^pub' | head -1 | cut -d: -f5 || true)
          fi
          mkdir -p dists/stable/main/binary-amd64 dists/stable/main/binary-arm64
          cd pool/main
          dpkg-scanpackages --arch amd64 . > ../../dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages --arch arm64 . > ../../dists/stable/main/binary-arm64/Packages
          cd ../..
          gzip -k -f dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages
          cat > dists/stable/Release <<EOF2
          Origin: peeramid-labs
          Label: peeramid-labs apt-repo
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Date: $(date -Ru)
          EOF2
          if [ -n "$GPG_ID" ]; then
            gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE:-}" \
              --default-key "$GPG_ID" --detach-sign --armor -o dists/stable/Release.gpg dists/stable/Release || true
            gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE:-}" \
              --default-key "$GPG_ID" --clearsign -o dists/stable/InRelease dists/stable/Release || true
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "slop ${VERSION}" || echo "No changes"
          git push origin main
