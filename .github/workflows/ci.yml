name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
    types: [opened, synchronize, labeled]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Fast lint & audit ─────────────────────────────────────────────
  lint:
    name: Lint & Audit
    if: >
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: "ci-lint-v1"

      - name: Install Tools (binstall)
        uses: cargo-bins/cargo-binstall@v1.17.9

      - name: Install cargo-deny
        run: |
          cargo binstall --no-confirm --force cargo-deny
          cargo deny --version

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: License & Advisory Audit
        run: cargo deny check || echo "::warning::cargo-deny not configured yet"

  # ── Supply-chain freshness (only when Cargo.lock changes) ─────────
  dep-age:
    name: Dependency Age Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if Cargo.lock changed
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            lockfile:
              - 'Cargo.lock'

      - name: Skip (no dep-age script in slop-cli yet)
        run: echo "Cargo.lock change detected — dep-age script not wired yet"

  # ── Tests (no NATS, no Ollama) ────────────────────────────────────
  test:
    name: Test
    if: >
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: "ci-test-v1"

      - name: Run Tests
        run: cargo test --workspace

  shellcheck:
    name: Shell Script Lint
    if: >
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck dpkg

      - name: Lint packaging scripts
        run: shellcheck packaging/deb/build-deb.sh

  typos:
    name: Spell Check
    if: >
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master
